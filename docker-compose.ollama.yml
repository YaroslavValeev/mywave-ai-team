# docker-compose.ollama.yml — локальный OpenAI-compatible LLM на RU
# Запуск вместе с app:
#   docker compose -f docker-compose.yml -f docker-compose.server-full.yml \
#     -f docker-compose.molt.yml -f docker-compose.ollama.yml --profile molt up -d
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # только внутри docker-сети; app ходит на http://ollama:11434
    expose:
      - "11434"
    # опционально с хоста для отладки:
    ports:
      - "127.0.0.1:11434:11434"

  app:
    environment:
      LLM_LOCAL_BASE_URL: ${LLM_LOCAL_BASE_URL:-http://ollama:11434/v1}
      LLM_LOCAL_API_KEY: ${LLM_LOCAL_API_KEY:-ollama}
      LLM_LOCAL_MODEL: ${LLM_LOCAL_MODEL:-llama3.2:3b}
    depends_on:
      ollama:
        condition: service_started

volumes:
  ollama_data:
