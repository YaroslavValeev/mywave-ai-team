# nginx site for agm.mywavetreaning.ru → AI-TEAM app on 127.0.0.1:8080
# Install on RU:
#   sudo cp deploy/nginx-agm.mywavetreaning.ru.conf /etc/nginx/sites-available/agm.mywavetreaning.ru
#   sudo ln -sf /etc/nginx/sites-available/agm.mywavetreaning.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d agm.mywavetreaning.ru
server {
    listen 80;
    server_name agm.mywavetreaning.ru;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Owner API key (как Caddy header_up) — браузер может не слать X-API-Key;
        # для HTML лучше ?link= или BasicAuth на уровне nginx (опционально).
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
