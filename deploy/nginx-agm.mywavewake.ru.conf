# nginx site for agm.mywavewake.ru → AI-TEAM app on 127.0.0.1:8080
# Install on RU:
#   sudo cp deploy/nginx-agm.mywavewake.ru.conf /etc/nginx/sites-available/agm.mywavewake.ru
#   sudo ln -sf /etc/nginx/sites-available/agm.mywavewake.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d agm.mywavewake.ru
server {
    listen 80;
    server_name agm.mywavewake.ru;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
