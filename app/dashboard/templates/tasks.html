<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks — MyWave AI-TEAM</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; background: #1a1a2e; color: #eee; }
        a { color: #4fc3f7; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 0.5rem 1rem; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; }
    </style>
</head>
<body>
    <h1>Задачи</h1>
    <p><a href="/">Назад</a></p>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Domain</th>
                <th>Status</th>
                <th>Criticality</th>
                <th>Created</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for t in tasks %}
            <tr>
                <td>{{ t.id }}</td>
                <td>{{ t.domain }}</td>
                <td>{{ t.status }}</td>
                <td>{{ t.criticality }}</td>
                <td>{{ t.created_at[:19] if t.created_at else '-' }}</td>
                <td><a href="/tasks/{{ t.id }}">Детали</a></td>
            </tr>
            {% else %}
            <tr><td colspan="6">Нет задач</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
