name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  token-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Token leakage scan
        run: |
          set -e
          FOUND=$(grep -rE 'ghp_|github_pat_|sk-[a-zA-Z0-9]{20,}|xoxb-[a-zA-Z0-9]{10,}|-----BEGIN (RSA |)PRIVATE KEY' . \
            --include='*.py' --include='*.yaml' --include='*.yml' --include='*.md' --include='*.json' --include='*.sh' \
            --exclude-dir=.git --exclude-dir=__pycache__ --exclude-dir=.pytest_cache 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: Token/sensitive pattern found. Remove secrets."
            echo "$FOUND"
            exit 1
          fi
          echo "Token scan OK"

  test:
    runs-on: ubuntu-latest
    needs: token-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run pytest (SQLite smoke)
        env:
          DATABASE_URL: sqlite:///:memory:
          OWNER_API_KEY: test_key_for_ci
        run: pytest tests/ -q --tb=short
