# docker-compose.molt.yml — Runtime (Molt). Requires --profile molt (Owner GO).
#
# Start:
#   docker compose -f docker-compose.yml -f docker-compose.server-full.yml \
#     -f docker-compose.molt.yml --profile molt up -d --build
#
# Stop:
#   docker compose -f docker-compose.yml -f docker-compose.server-full.yml \
#     -f docker-compose.molt.yml --profile molt stop molt
#
# See: docs/migration/MOLT_ON_RU_CHECKLIST.md

services:
  molt:
    profiles: ["molt"]
    build:
      context: .
      dockerfile: services/molt_http_service/Dockerfile
    env_file:
      - .env
    environment:
      MOLT_HTTP_HOST: "0.0.0.0"
      MOLT_HTTP_PORT: "8765"
      CANONICAL_PATH_ENABLED: "1"
      CANONICAL_STORAGE: "sqlite"
      CANONICAL_SQLITE_PATH: "/data/canonical.db"
      AGENTS_CONTROL_API_URL: ${AGENTS_CONTROL_API_URL:-http://app:8080}
      AGENTS_API_KEY: ${AGENTS_API_KEY:-${OWNER_API_KEY}}
      AGENTS_CONTROL_ENABLED: ${AGENTS_CONTROL_ENABLED:-1}
      MOLT_RUN_OWNER: ${MOLT_RUN_OWNER:-0}
    volumes:
      - molt_data:/data
    # Localhost only on host — not public internet
    ports:
      - "127.0.0.1:8765:8765"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  molt_data: {}
