# docker-compose.yml — app + postgres + Caddy reverse proxy
# agm.mywavewake.ru: nginx (prod) или Caddy → BasicAuth → app (X-API-Key прокидывается автоматически)
#
# Профили образа app (см. docs/CANONICAL-RUNTIME.md):
#   DOCKER_BUILD_TARGET=lite  — office-lite, rule_based (по умолчанию)
#   DOCKER_BUILD_TARGET=full  — office-full, crewai; задайте ORCHESTRATION_ENGINE=auto и OPENAI_API_KEY в .env
# Prod RU (CrewAI norm): docker compose -f docker-compose.yml -f docker-compose.server-full.yml up -d --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_BUILD_TARGET:-lite}
    env_file:
      - .env
    environment:
      # lite default = rule_based (образ без crewai). Office-full: DOCKER_BUILD_TARGET=full + ORCHESTRATION_ENGINE=auto.
      # При engine=auto код включает CrewAI только если есть OPENAI_API_KEY/BASE_URL (иначе быстрый fallback).
      ORCHESTRATION_ENGINE: ${ORCHESTRATION_ENGINE:-rule_based}
      DATABASE_URL: postgresql+psycopg2://mywave:${POSTGRES_PASSWORD}@postgres:5432/mywave_ai
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mywave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mywave_ai
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./app/artifacts:/app/app/artifacts
    # create_all() не добавляет колонки к уже существующим таблицам — нужны миграции Alembic
    # После reboot postgres может ответить на health раньше, чем примет соединения — ретраи alembic.
    command:
      [
        "sh",
        "-c",
        "i=0; until alembic upgrade head; do i=$$((i+1)); if [ $$i -ge 15 ]; then echo 'alembic failed'; exit 1; fi; echo \"alembic retry $$i/15\"; sleep 2; done; exec python -m app.main",
      ]
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mywave_ai
      POSTGRES_USER: mywave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywave -d mywave_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      OWNER_API_KEY: ${OWNER_API_KEY}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata: {}
  caddy_data: {}
  caddy_config: {}
